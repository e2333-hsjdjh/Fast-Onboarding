# Example nginx reverse proxy for Fast Onboarding.
#
# Start the app locally:
#   PYTHONPATH=src python3 -m fast_onboarding.cli.web --host 127.0.0.1 --port 8787 --base-path /resume
#
# Then include this location in your server block.

location /resume/ {
    proxy_pass http://127.0.0.1:8787/resume/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /resume;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_hide_header X-Powered-By;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    proxy_redirect off;
}
